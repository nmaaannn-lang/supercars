<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>APEX — Supercar Gallery</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #c9a84c;
    --gold-dim: #7a5f22;
    --bg: #080808;
    --surface: #111111;
    --border: rgba(255,255,255,0.07);
    --text: #f0ece4;
    --muted: #666;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-weight: 300;
    overflow-x: hidden;
    cursor: none;
  }

  /* Custom cursor */
  .cursor {
    position: fixed;
    width: 8px; height: 8px;
    background: var(--gold);
    border-radius: 50%;
    pointer-events: none;
    z-index: 9999;
    transform: translate(-50%, -50%);
    transition: transform 0.1s;
  }
  .cursor-ring {
    position: fixed;
    width: 32px; height: 32px;
    border: 1px solid rgba(201,168,76,0.5);
    border-radius: 50%;
    pointer-events: none;
    z-index: 9998;
    transform: translate(-50%, -50%);
    transition: all 0.15s ease;
  }

  /* ── HERO ── */
  .hero {
    position: relative;
    width: 100%;
    height: 100vh;
    overflow: hidden;
    display: flex;
    align-items: flex-end;
    justify-content: flex-start;
  }

  .hero-video {
    position: absolute;
    inset: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    z-index: 0;
  }

  /* Cinematic dark overlay — fades out to reveal video */
  .hero-blackout {
    position: absolute;
    inset: 0;
    background: #000;
    z-index: 1;
    animation: blackoutLift 3.5s ease-in-out forwards;
    animation-delay: 0.5s;
    opacity: 1;
  }

  @keyframes blackoutLift {
    0%   { opacity: 1; }
    60%  { opacity: 0.92; }
    100% { opacity: 0; pointer-events: none; }
  }

  /* Headlight flash effect */
  .hero-flash {
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at 35% 60%, rgba(255,240,180,0.35) 0%, transparent 55%),
                radial-gradient(ellipse at 65% 60%, rgba(255,240,180,0.35) 0%, transparent 55%);
    z-index: 2;
    opacity: 0;
    animation: headlightOn 0.8s ease-out forwards;
    animation-delay: 1.8s;
  }

  @keyframes headlightOn {
    0%   { opacity: 0; }
    20%  { opacity: 1; }
    60%  { opacity: 0.6; }
    100% { opacity: 0; }
  }

  /* Gradient overlay on top of video */
  .hero-gradient {
    position: absolute;
    inset: 0;
    background: linear-gradient(
      to bottom,
      rgba(8,8,8,0.2) 0%,
      transparent 40%,
      rgba(8,8,8,0.7) 80%,
      rgba(8,8,8,1) 100%
    );
    z-index: 3;
  }

  .hero-content {
    position: relative;
    z-index: 4;
    padding: 0 6vw 6vh;
    opacity: 0;
    transform: translateY(20px);
    animation: heroContentIn 1s ease forwards;
    animation-delay: 3s;
  }

  @keyframes heroContentIn {
    to { opacity: 1; transform: translateY(0); }
  }

  .hero-eyebrow {
    font-size: 11px;
    letter-spacing: 6px;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 12px;
  }

  .hero-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(64px, 12vw, 140px);
    line-height: 0.9;
    color: #fff;
    letter-spacing: 2px;
  }

  .hero-title span {
    color: var(--gold);
  }

  .hero-sub {
    font-size: 13px;
    color: rgba(240,236,228,0.5);
    letter-spacing: 2px;
    margin-top: 16px;
    text-transform: uppercase;
  }

  .hero-scroll {
    position: absolute;
    bottom: 40px;
    right: 6vw;
    z-index: 4;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    opacity: 0;
    animation: heroContentIn 1s ease forwards;
    animation-delay: 3.5s;
  }

  .hero-scroll span {
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--muted);
    text-transform: uppercase;
    writing-mode: vertical-rl;
  }

  .scroll-line {
    width: 1px;
    height: 60px;
    background: linear-gradient(to bottom, var(--gold), transparent);
    animation: scrollPulse 2s ease-in-out infinite;
    animation-delay: 4s;
  }

  @keyframes scrollPulse {
    0%, 100% { opacity: 0.3; transform: scaleY(1); }
    50% { opacity: 1; transform: scaleY(1.2); }
  }

  /* ── NAV ── */
  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 24px 6vw;
    background: linear-gradient(to bottom, rgba(8,8,8,0.8), transparent);
    backdrop-filter: blur(0px);
  }

  .nav-logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    letter-spacing: 4px;
    color: #fff;
  }

  .nav-logo span { color: var(--gold); }

  .nav-links {
    display: flex;
    gap: 32px;
    list-style: none;
  }

  .nav-links a {
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: rgba(240,236,228,0.5);
    text-decoration: none;
    transition: color 0.2s;
  }

  .nav-links a:hover { color: var(--gold); }

  /* ── GALLERY SECTION ── */
  .gallery-section {
    padding: 80px 6vw;
  }

  .section-header {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    margin-bottom: 48px;
  }

  .section-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(36px, 5vw, 64px);
    letter-spacing: 2px;
    line-height: 1;
  }

  .section-title span { color: var(--gold); }

  .car-count {
    font-size: 11px;
    letter-spacing: 3px;
    color: var(--muted);
    text-transform: uppercase;
    padding-bottom: 4px;
  }

  /* Filter bar */
  .filters {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 40px;
  }

  .filter-btn {
    padding: 8px 20px;
    border-radius: 0;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    cursor: none;
    transition: all 0.2s;
  }

  .filter-btn:hover {
    border-color: var(--gold-dim);
    color: var(--text);
  }

  .filter-btn.active {
    background: var(--gold);
    border-color: var(--gold);
    color: #000;
  }

  /* Grid */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 2px;
  }

  .card {
    position: relative;
    overflow: hidden;
    cursor: none;
    aspect-ratio: 4/3;
    background: var(--surface);
  }

  .card img {
    width: 100%; height: 100%;
    object-fit: cover;
    transition: transform 0.6s cubic-bezier(0.25,0.46,0.45,0.94), filter 0.4s;
    filter: brightness(0.75) saturate(0.8);
  }

  .card:hover img {
    transform: scale(1.08);
    filter: brightness(0.9) saturate(1.1);
  }

  .card-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, transparent 50%);
    z-index: 1;
  }

  .card-info {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    padding: 20px;
    z-index: 2;
    transform: translateY(8px);
    transition: transform 0.3s;
  }

  .card:hover .card-info { transform: translateY(0); }

  .card-brand {
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 4px;
  }

  .card-name {
    font-size: 18px;
    font-weight: 500;
    color: #fff;
    letter-spacing: 0.5px;
  }

  .card-meta {
    display: flex;
    gap: 16px;
    margin-top: 8px;
    opacity: 0;
    transform: translateY(6px);
    transition: all 0.3s 0.05s;
  }

  .card:hover .card-meta {
    opacity: 1;
    transform: translateY(0);
  }

  .card-meta span {
    font-size: 11px;
    color: rgba(240,236,228,0.5);
    letter-spacing: 1px;
  }

  .card-meta span strong {
    color: var(--text);
    font-weight: 400;
  }

  /* Gold accent line top-left on hover */
  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 0; height: 2px;
    background: var(--gold);
    z-index: 3;
    transition: width 0.4s ease;
  }
  .card:hover::before { width: 60px; }

  /* ── MODAL ── */
  .modal-bg {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.88);
    z-index: 200;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    backdrop-filter: blur(6px);
  }

  .modal-bg.open { display: flex; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    max-width: 580px;
    width: 100%;
    position: relative;
    animation: modalIn 0.3s ease;
  }

  @keyframes modalIn {
    from { opacity: 0; transform: scale(0.96) translateY(10px); }
    to { opacity: 1; transform: scale(1) translateY(0); }
  }

  .modal img {
    width: 100%;
    height: 260px;
    object-fit: cover;
    display: block;
    filter: brightness(0.85);
  }

  .modal-body { padding: 28px 32px 32px; }

  .modal-eyebrow {
    font-size: 10px;
    letter-spacing: 4px;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .modal-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 42px;
    letter-spacing: 2px;
    color: #fff;
    line-height: 1;
    margin-bottom: 24px;
  }

  .spec-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 1px;
    background: var(--border);
    border: 1px solid var(--border);
  }

  .spec-item {
    padding: 14px 16px;
    background: var(--surface);
  }

  .spec-label {
    font-size: 9px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 6px;
  }

  .spec-val {
    font-size: 16px;
    font-weight: 500;
    color: #fff;
  }

  .modal-close {
    position: absolute;
    top: 16px; right: 16px;
    background: rgba(0,0,0,0.6);
    border: 1px solid var(--border);
    color: var(--muted);
    width: 36px; height: 36px;
    display: flex; align-items: center; justify-content: center;
    cursor: none;
    font-size: 18px;
    transition: all 0.2s;
    z-index: 10;
  }

  .modal-close:hover { border-color: var(--gold); color: var(--gold); }

  /* ── FOOTER ── */
  footer {
    border-top: 1px solid var(--border);
    padding: 32px 6vw;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  footer .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    letter-spacing: 4px;
    color: var(--muted);
  }

  footer .logo span { color: var(--gold-dim); }

  footer p {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 1px;
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--gold-dim); }
</style>
</head>

<!-- MODAL -->

    </div>
  </div>
</div>

<!-- FOOTER -->
<footer>

function renderCards(filter) {
  const grid = document.getElementById("carGrid");
  const list = filter === "all" ? cars : cars.filter(c => c.brand === filter);
  document.getElementById("countLabel").textContent = list.length + " cars";
  grid.innerHTML = list.map((car, i) => `
    <div class="card" onclick="openModal(${cars.indexOf(car)})" style="animation: fadeUp 0.5s ease ${i*0.04}s both;">
      <img src="${car.img}" alt="${car.name}" loading="lazy" onerror="this.style.opacity='0'">
      <div class="card-overlay"></div>
      <div class="card-info">
        <div class="card-brand">${car.brand}</div>
        <div class="card-name">${car.name}</div>
        <div class="card-meta">
          <span><strong>${car.hp}</strong></span>
          <span><strong>${car.speed}</strong></span>
          <span><strong>${car.price}</strong></span>
        </div>
      </div>
    </div>
  `).join("");
}

function filterCars(brand, btn) {
  document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  renderCards(brand);
}

function openModal(idx) {
  const car = cars[idx];
  document.getElementById("mImg").src = car.img;
  document.getElementById("mImg").alt = car.name;
  document.getElementById("mBrand").textContent = car.brand + " · " + car.year;
  document.getElementById("mName").textContent = car.name;
  document.getElementById("mSpecs").innerHTML = [
    ["Price", car.price], ["Power", car.hp], ["Top Speed", car.speed],
    ["Engine", car.engine], ["Weight", car.weight], ["Year", car.year]
  ].map(([l,v]) => `<div class="spec-item"><div class="spec-label">${l}</div><div class="spec-val">${v}</div></div>`).join("");
  document.getElementById("modal").classList.add("open");
}

function bgClose(e) {
  if (e.target.id === "modal") document.getElementById("modal").classList.remove("open");
}

// Custom cursor
const cursor = document.getElementById("cursor");
const ring = document.getElementById("cursorRing");
let mx = 0, my = 0, rx = 0, ry = 0;
document.addEventListener("mousemove", e => { mx = e.clientX; my = e.clientY; cursor.style.left = mx+"px"; cursor.style.top = my+"px"; });
(function animRing() {
  rx += (mx - rx) * 0.12;
  ry += (my - ry) * 0.12;
  ring.style.left = rx+"px"; ring.style.top = ry+"px";
  requestAnimationFrame(animRing);
})();

// fadeUp keyframe
const s = document.createElement("style");
s.textContent = `@keyframes fadeUp { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }`;
document.head.appendChild(s);

renderCards("all");
</script>
